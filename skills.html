<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
    content="Portfolio of Dylan showcasing web development, game development and software engineering projects.">
    <title>JDylanDev Skill Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header> 
        <div class="logoContainer">
            <div class="imgContainer">
                <img src="https://www.mamp.one/wp-content/uploads/2024/09/image-resources2.jpg"/>
            </div>
            <div>
                <h2>JDylanDev</h2>
            </div>
        </div> 

        <nav>
            <a href="home.html">Home</a>
            <a href="skills.html" class="activePage">Skills</a>
            <a href="projects.html">Projects</a>
        </nav>
    </header>
    <main class="skillsPage">
        <div class="skillSection" data-tabgroup>
            <div class="skillCategoryBar">
                <button type="button" data-tab="gamedev" class="active">2D Game Dev</button>
                <button type="button" data-tab="webdev">Web Dev</button>
            </div>

            <div class="skillMapWrapper">
                <!-- 2D GAME DEV TREE ------------------------------------- -->
                <div class="skillMap active" data-panel="gamedev">
                    <div class="skillCenter">
                        <div class="centerCore">
                            <i class="fa-solid fa-user-astronaut"></i>
                            <span>JDylanDev</span>
                        </div>
                    </div>
                    <button type="button" class="skillNode" aria-label="Godot Engine">
                        <i class="fa-solid fa-gamepad"></i>
                        <!-- Swap the <i> above for your own icon:
                             <img src="assets/icons/skills/godot.svg" alt="Godot Engine"> -->
                        <span class="skillBubble">
                            <strong>Godot Engine</strong>
                            [Placeholder: describe your experience with Godot]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="GDScript">
                        <i class="fa-solid fa-code"></i>
                        <span class="skillBubble">
                            <strong>GDScript</strong>
                            [Placeholder: describe your experience with GDScript]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="Game Design">
                        <i class="fa-solid fa-chess-knight"></i>
                        <span class="skillBubble">
                            <strong>Game Design</strong>
                            [Placeholder: describe your experience with game design]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="2D Animation">
                        <i class="fa-solid fa-image"></i>
                        <span class="skillBubble">
                            <strong>2D Animation</strong>
                            [Placeholder: describe your experience with sprites/animation]
                        </span>
                    </button>
                    <!-- Add more <button class="skillNode"> entries here — the
                         circle layout in script.js redistributes automatically -->
                </div>

                <!-- WEB DEV TREE ------------------------------------------ -->
                <div class="skillMap" data-panel="webdev">
                    <div class="skillCenter">
                        <div class="centerCore">
                            <i class="fa-solid fa-user-astronaut"></i>
                            <span>JDylanDev</span>
                        </div>
                    </div>
                    <button type="button" class="skillNode" aria-label="HTML">
                        <i class="fa-brands fa-html5"></i>
                        <span class="skillBubble">
                            <strong>HTML</strong>
                            [Placeholder: describe your experience with HTML]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="CSS">
                        <i class="fa-brands fa-css3-alt"></i>
                        <span class="skillBubble">
                            <strong>CSS</strong>
                            [Placeholder: describe your experience with CSS]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="JavaScript">
                        <i class="fa-brands fa-js"></i>
                        <span class="skillBubble">
                            <strong>JavaScript</strong>
                            [Placeholder: describe your experience with JavaScript]
                        </span>
                    </button>

                    <button type="button" class="skillNode" aria-label="Responsive Design">
                        <i class="fa-solid fa-mobile-screen"></i>
                        <span class="skillBubble">
                            <strong>Responsive Design</strong>
                            [Placeholder: describe your experience with responsive layouts]
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
