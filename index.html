<!DOCTYPE html>
<html lang="en" class="splash-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JDylanDev EntryPoint">
    <title>JDylanDev</title>
    <link rel="icon" href="assets/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles-base.css" />
    <link rel="stylesheet" href="styles-components.css" />
    <link rel="stylesheet" href="styles-effects.css" />
</head>
<body>
    <!-- ===== SIDE DECORATIVE ANIMATIONS ===== -->
    <div class="splash-decor-left" aria-hidden="true">
        <div class="decor-beam decor-beam-1"></div>
        <div class="decor-beam decor-beam-2"></div>
        <div class="decor-pulse"></div>
    </div>
    <div class="splash-decor-right" aria-hidden="true">
        <div class="decor-beam decor-beam-3"></div>
        <div class="decor-beam decor-beam-4"></div>
        <div class="decor-pulse"></div>
    </div>

    <!-- ===== DIGITAL RAIN CANVAS (Matrix-style background) ===== -->
    <canvas id="matrixRain"></canvas>

    <!-- ===== SPLASH SCREEN ===== -->
    <div class="splash" id="splash">
        <!-- HUD Rings (slightly scaled down) -->
        <div class="hud-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="ring ring-4"></div>
            <div class="hud-core"></div>
            <div class="orbit-dot orbit-dot-1"></div>
            <div class="orbit-dot orbit-dot-2"></div>
        </div>

        <!-- Terminal Boot -->
        <div class="terminal" id="terminal">
            <div class="terminal-line" id="line1">
                <span class="prompt">></span>
                <span class="cmd">Initializing</span>
                <span class="highlight-cmd">JDylanDev</span>
                <span class="cmd">system...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line2">
                <span class="prompt">></span>
                <span class="cmd">Loading portfolio modules...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line3">
                <span class="prompt">></span>
                <span class="cmd">Establishing secure connection...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line4">
                <span class="prompt">></span>
                <span class="success-text">System online. Ready.</span>
                <span class="terminal-cursor"></span>
            </div>
        </div>

        <!-- Brand -->
        <div class="splash-brand" id="splashBrand">
            <h1 data-text="JDylanDev">
                J<span class="brand-accent">Dylan</span><span class="brand-accent">Dev</span>
            </h1>
            <div class="brand-sub">Web Developer &bull; Game Developer</div>
        </div>

        <!-- Enter Button -->
        <button class="enter-btn" id="enterBtn">
            Enter Portfolio &nbsp;<i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <!-- ===== COMET LAYER ===== -->
    <div class="cometLayer">
        <svg class="comet c1" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c2" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c3" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c4" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c5" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c6" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c7" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c8" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c9" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c10" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c11" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c12" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c13" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
        <svg class="comet c14" viewBox="0 0 100 100" aria-hidden="true"><path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" /></svg>
    </div>

    <script src="script.js"></script>
    <script>
        (function() {
            /* ===== MATRIX DIGITAL RAIN ===== */
            const canvas = document.getElementById('matrixRain');
            const ctx = canvas.getContext('2d');
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789<>/{}[]|&^%$#@!'.split('');
            const fontSize = 12;
            const columns = Math.floor(canvas.width / fontSize);
            const drops = Array(columns).fill(1);

            function drawRain() {
                ctx.fillStyle = 'rgba(12, 15, 20, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.font = fontSize + 'px monospace';
                
                for (let i = 0; i < drops.length; i++) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    const x = i * fontSize;
                    const y = drops[i] * fontSize;
                    
                    // Gradient from bright teal (top) to dim (bottom)
                    const brightness = Math.max(0, 1 - (y / canvas.height) * 0.8);
                    ctx.fillStyle = `rgba(79, 224, 203, ${brightness * 0.6})`;
                    ctx.fillText(char, x, y);
                    
                    // Occasionally make a character brighter
                    if (Math.random() > 0.98) {
                        ctx.fillStyle = `rgba(79, 224, 203, ${brightness * 0.9})`;
                        ctx.fillText(char, x, y);
                    }

                    if (y > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }

            setInterval(drawRain, 45);

            /* ===== SPLASH ANIMATION SEQUENCE ===== */
            const splash = document.getElementById('splash');
            const lines = [
                document.getElementById('line1'),
                document.getElementById('line2'),
                document.getElementById('line3'),
                document.getElementById('line4')
            ];
            const brand = document.getElementById('splashBrand');
            const btn = document.getElementById('enterBtn');

            lines.forEach(line => {
                line.style.opacity = '0';
                const cursor = line.querySelector('.terminal-cursor');
                if (cursor) cursor.style.display = 'none';
            });

            function revealLine(index) {
                if (index >= lines.length) {
                    setTimeout(revealBrand, 400);
                    return;
                }
                const line = lines[index];
                line.style.opacity = '1';
                const cursor = line.querySelector('.terminal-cursor');
                if (cursor) cursor.style.display = 'inline-block';
                const delays = [900, 700, 800, 600];
                setTimeout(() => {
                    if (cursor) cursor.style.display = 'none';
                    revealLine(index + 1);
                }, delays[index] || 700);
            }

            function revealBrand() {
                brand.classList.add('reveal');
                brand.classList.add('glitch');
                setTimeout(() => { brand.classList.remove('glitch'); }, 1200);
                setTimeout(() => { btn.classList.add('show'); }, 400);
            }

            setTimeout(() => { revealLine(0); }, 1200);

            btn.addEventListener('click', function(e) {
                e.preventDefault();
                splash.classList.add('fade-out');
                setTimeout(() => { window.location.href = 'home.html'; }, 600);
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && btn.classList.contains('show')) {
                    btn.click();
                }
            });
        })();
    </script>
</body>
</html>
