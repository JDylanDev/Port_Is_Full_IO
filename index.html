<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JDylanDev — Portfolio splash page with interactive boot sequence.">
    <title>JDylanDev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400..700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===== SPLASH RESET ===== */
        html, body {
            height: 100%;
            overflow: hidden;
        }

        .splash {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-color);
            overflow: hidden;
        }

        /* ===== CRT SCAN LINES ===== */
        .splash::before {
            content: "";
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.12) 2px,
                rgba(0, 0, 0, 0.12) 4px
            );
            pointer-events: none;
            z-index: 2;
            animation: scanlineMove 8s linear infinite;
        }

        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* ===== HUD RING CONTAINER ===== */
        .hud-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-bottom: 40px;
            opacity: 0;
            transform: scale(0.6);
            animation: hudAppear 0.8s cubic-bezier(.34,1.56,.64,1) 0.3s forwards;
        }

        @keyframes hudAppear {
            0% { opacity: 0; transform: scale(0.6); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ===== RINGS ===== */
        .ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 2px solid transparent;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .ring-1 {
            width: 100%;
            height: 100%;
            border-color: rgba(79, 224, 203, 0.15);
            animation: ringPulse 3s ease-in-out infinite;
        }

        .ring-2 {
            width: 75%;
            height: 75%;
            border-color: rgba(79, 224, 203, 0.25);
            border-top-color: var(--primary-color);
            animation: ringSpin 6s linear infinite;
        }

        .ring-3 {
            width: 50%;
            height: 50%;
            border-color: rgba(79, 224, 203, 0.2);
            border-bottom-color: var(--accent-blue);
            animation: ringSpinReverse 4s linear infinite;
        }

        .ring-4 {
            width: 32%;
            height: 32%;
            border-color: transparent;
            border-top: 3px solid var(--accent-pink);
            border-right: 3px solid var(--accent-pink);
            animation: ringSpin 8s linear infinite;
            filter: blur(1px);
        }

        @keyframes ringPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.06); opacity: 1; }
        }

        @keyframes ringSpin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes ringSpinReverse {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); }
        }

        /* ===== CORE DOT ===== */
        .hud-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: 0 0 20px rgba(79, 224, 203, 0.6), 0 0 60px rgba(79, 224, 203, 0.2);
            animation: corePulse 2s ease-in-out infinite;
        }

        @keyframes corePulse {
            0%, 100% { box-shadow: 0 0 20px rgba(79, 224, 203, 0.6), 0 0 60px rgba(79, 224, 203, 0.2); }
            50% { box-shadow: 0 0 30px rgba(79, 224, 203, 0.8), 0 0 80px rgba(79, 224, 203, 0.3); }
        }

        /* ===== ORBITING DOTS ===== */
        .orbit-dot {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: 0 0 10px rgba(79, 224, 203, 0.8);
        }

        .orbit-dot-1 {
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
            animation: orbitDot1 4s linear infinite;
        }

        .orbit-dot-2 {
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            animation: orbitDot2 4s linear infinite;
        }

        @keyframes orbitDot1 {
            0% { top: -3px; opacity: 1; }
            25% { top: 50%; opacity: 0.3; }
            50% { top: calc(100% - 3px); opacity: 1; }
            75% { top: 50%; opacity: 0.3; }
            100% { top: -3px; opacity: 1; }
        }

        @keyframes orbitDot2 {
            0% { bottom: -3px; opacity: 1; }
            25% { bottom: 50%; opacity: 0.3; }
            50% { bottom: calc(100% - 3px); opacity: 1; }
            75% { bottom: 50%; opacity: 0.3; }
            100% { bottom: -3px; opacity: 1; }
        }

        /* ===== TERMINAL TEXT ===== */
        .terminal {
            text-align: left;
            max-width: 420px;
            width: 90%;
            padding: 16px 20px;
            margin-bottom: 32px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(79, 224, 203, 0.12);
            border-radius: 8px;
            opacity: 0;
            animation: fadeUp 0.5s ease 1s forwards;
            min-height: 120px;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(16px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .terminal-line {
            font-family: 'Courier New', 'Nunito', monospace;
            font-size: 15px;
            color: var(--secondary-color);
            opacity: 0;
            line-height: 1.8;
            white-space: nowrap;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .terminal-line .prompt {
            color: var(--primary-color);
            font-weight: 700;
            margin-right: 4px;
        }

        .terminal-line .cmd {
            color: var(--text-color);
        }

        .terminal-line .highlight-cmd {
            color: var(--accent-blue);
        }

        .terminal-line .success-text {
            color: var(--accent-green);
        }

        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--primary-color);
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ===== LOGO GLITCH ===== */
        .splash-brand {
            text-align: center;
            margin-bottom: 28px;
            opacity: 0;
            transform: scale(0.8);
        }

        .splash-brand.reveal {
            animation: brandReveal 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
        }

        @keyframes brandReveal {
            0% { opacity: 0; transform: scale(0.8); filter: blur(4px); }
            60% { opacity: 1; transform: scale(1.08); filter: blur(0); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .splash-brand h1 {
            font-family: 'Fredoka', sans-serif;
            font-size: clamp(36px, 6vw, 56px);
            color: var(--text-color);
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .splash-brand h1 .brand-accent {
            color: var(--primary-color);
            text-shadow: 0 0 30px rgba(79, 224, 203, 0.4);
        }

        .splash-brand .brand-sub {
            font-family: 'Nunito', sans-serif;
            font-size: clamp(13px, 2vw, 16px);
            color: var(--secondary-color);
            margin-top: 6px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Glitch effect on the logo */
        .splash-brand.glitch h1::before,
        .splash-brand.glitch h1::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .splash-brand.glitch h1::before {
            color: var(--accent-pink);
            z-index: -1;
            animation: glitchShift 0.3s ease 3;
            clip-path: inset(20% 0 40% 0);
        }

        .splash-brand.glitch h1::after {
            color: var(--accent-blue);
            z-index: -1;
            animation: glitchShift 0.3s ease 3 reverse;
            clip-path: inset(60% 0 10% 0);
        }

        @keyframes glitchShift {
            0% { transform: translate(0); }
            20% { transform: translate(-4px, 2px); }
            40% { transform: translate(4px, -2px); }
            60% { transform: translate(-2px, 4px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* ===== ENTER BUTTON ===== */
        .enter-btn {
            opacity: 0;
            transform: translateY(20px);
            padding: 16px 44px;
            border-radius: 999px;
            border: 2px solid var(--primary-color);
            background: transparent;
            color: var(--primary-color);
            font-family: 'Fredoka', sans-serif;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 1.5px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
            text-transform: uppercase;
            box-shadow: 0 0 0 rgba(79, 224, 203, 0);
        }

        .enter-btn.show {
            opacity: 1;
            transform: translateY(0);
            animation: btnPulse 2.5s ease-in-out infinite 0.5s;
        }

        @keyframes btnPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(79, 224, 203, 0.2); }
            50% { box-shadow: 0 0 25px rgba(79, 224, 203, 0.5), 0 0 60px rgba(79, 224, 203, 0.15); }
        }

        .enter-btn:hover {
            background: var(--primary-color);
            color: #000;
            transform: translateY(-3px) scale(1.04);
            box-shadow: 0 0 35px rgba(79, 224, 203, 0.5), 0 8px 30px rgba(79, 224, 203, 0.2);
            animation: none;
        }

        .enter-btn:active {
            transform: translateY(0) scale(0.98);
        }

        /* ===== PAGE TRANSITION ===== */
        .splash.fade-out {
            animation: splashOut 0.6s ease forwards;
        }

        @keyframes splashOut {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.02); filter: blur(2px); }
            100% { opacity: 0; transform: scale(0.95); filter: blur(8px); }
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .hud-container {
                width: 180px;
                height: 180px;
            }
            .terminal {
                max-width: 320px;
                padding: 12px 16px;
            }
            .terminal-line {
                font-size: 13px;
            }
            .enter-btn {
                padding: 14px 32px;
                font-size: 15px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .splash::before { animation: none; }
            .hud-container { animation: none; opacity: 1; transform: scale(1); }
            .ring { animation: none !important; }
            .hud-core { animation: none; }
            .orbit-dot { animation: none !important; opacity: 0; }
            .terminal { animation: none; opacity: 1; }
            .splash-brand.reveal { animation: none; opacity: 1; transform: scale(1); }
            .splash-brand.glitch h1::before,
            .splash-brand.glitch h1::after { animation: none; display: none; }
            .enter-btn.show { animation: none; }
            .enter-btn { opacity: 1; transform: translateY(0); }
            .terminal-line { animation: none !important; opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- ===== SPLASH SCREEN ===== -->
    <div class="splash" id="splash">
        <!-- HUD Rings -->
        <div class="hud-container">
            <div class="ring ring-1"></div>
            <div class="ring ring-2"></div>
            <div class="ring ring-3"></div>
            <div class="ring ring-4"></div>
            <div class="hud-core"></div>
            <div class="orbit-dot orbit-dot-1"></div>
            <div class="orbit-dot orbit-dot-2"></div>
        </div>

        <!-- Terminal Boot -->
        <div class="terminal" id="terminal">
            <div class="terminal-line" id="line1">
                <span class="prompt">></span>
                <span class="cmd">Initializing</span>
                <span class="highlight-cmd">JDylanDev</span>
                <span class="cmd">system...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line2">
                <span class="prompt">></span>
                <span class="cmd">Loading portfolio modules...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line3">
                <span class="prompt">></span>
                <span class="cmd">Establishing secure connection...</span>
                <span class="terminal-cursor"></span>
            </div>
            <div class="terminal-line" id="line4">
                <span class="prompt">></span>
                <span class="success-text">System online. Ready.</span>
                <span class="terminal-cursor"></span>
            </div>
        </div>

        <!-- Brand -->
        <div class="splash-brand" id="splashBrand">
            <h1 data-text="JDylanDev">
                <span class="brand-accent">JD</span>ylan<span class="brand-accent">Dev</span>
            </h1>
            <div class="brand-sub">Web Developer &bull; Game Developer</div>
        </div>

        <!-- Enter Button -->
        <button class="enter-btn" id="enterBtn">
            Enter Portfolio &nbsp;<i class="fa-solid fa-arrow-right"></i>
        </button>
    </div>

    <!-- ===== COMET LAYER (behind splash) ===== -->
    <div class="cometLayer">
        <svg class="comet c1" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c2" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c3" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c4" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c5" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c6" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
        <svg class="comet c7" viewBox="0 0 100 100" aria-hidden="true">
            <path d="M50 0 C55 40 60 45 100 50 C60 55 55 60 50 100 C45 60 40 55 0 50 C40 45 45 40 50 0 Z" />
        </svg>
    </div>

    <script src="script.js"></script>
    <script>
        /* =========================================================
           SPLASH BOOT ANIMATION ORCHESTRATOR
           ========================================================= */
        (function() {
            const splash = document.getElementById('splash');
            const lines = [
                document.getElementById('line1'),
                document.getElementById('line2'),
                document.getElementById('line3'),
                document.getElementById('line4')
            ];
            const brand = document.getElementById('splashBrand');
            const btn = document.getElementById('enterBtn');

            // Hide all terminal lines initially (override CSS opacity)
            lines.forEach(line => {
                line.style.opacity = '0';
                const cursor = line.querySelector('.terminal-cursor');
                if (cursor) cursor.style.display = 'none';
            });

            // ===== REVEAL LINES SEQUENTIALLY =====
            function revealLine(index) {
                if (index >= lines.length) {
                    // All lines shown — reveal brand
                    setTimeout(revealBrand, 400);
                    return;
                }

                const line = lines[index];
                line.style.opacity = '1';
                const cursor = line.querySelector('.terminal-cursor');
                if (cursor) cursor.style.display = 'inline-block';

                // After a delay, hide cursor and go to next line
                const delays = [900, 700, 800, 600];
                setTimeout(() => {
                    if (cursor) cursor.style.display = 'none';
                    revealLine(index + 1);
                }, delays[index] || 700);
            }

            // ===== REVEAL BRAND =====
            function revealBrand() {
                brand.classList.add('reveal');
                brand.classList.add('glitch');

                // Remove glitch after a moment
                setTimeout(() => {
                    brand.classList.remove('glitch');
                }, 1200);

                // Show the button
                setTimeout(() => {
                    btn.classList.add('show');
                }, 400);
            }

            // ===== START ANIMATION =====
            // Wait for initial animations to settle
            setTimeout(() => {
                revealLine(0);
            }, 1200);

            // ===== ENTER BUTTON CLICK =====
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                splash.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 600);
            });

            // ===== KEYBOARD: Press Enter to go =====
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && btn.classList.contains('show')) {
                    btn.click();
                }
            });
        })();
    </script>
</body>
</html>
